name: Generate Name_Place.xlsx

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/generate-name-place-excel.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip openpyxl

      - name: Generate Excel
        run: |
          python - <<'PY'
          from openpyxl import Workbook
          wb = Workbook()
          ws = wb.active
          ws.title = "Sheet1"
          ws.append(["NAME","PLACE"])
          ws.append(["Varsha","Chennai"])
          ws.append(["Varsha","Bangalore"])
          wb.save("Name_Place.xlsx")
          PY

      - name: Commit Excel
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add Name_Place.xlsx with NAME/PLACE data"
          file_pattern: Name_Place.xlsx
          branch: main
