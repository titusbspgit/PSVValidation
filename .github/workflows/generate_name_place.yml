name: Generate Name_Place.xlsx

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install --no-input openpyxl
      - name: Generate Excel
        run: |
          python scripts/generate_name_place.py
      - name: Commit and push Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Name_Place.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add Name_Place.xlsx with NAME/PLACE data (Varsha in Chennai and Bangalore) [skip ci]"
          git push origin HEAD:main
