name: Generate Name_Place.xlsx

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl
      - name: Generate Excel
        run: |
          python scripts/build_excel.py
      - name: Commit Excel artifact
        run: |
          if [ -n "$(git status --porcelain Name_Place.xlsx)" ]; then
            git config user.name "excel_testing Agent"
            git config user.email "actions@github.com"
            git add Name_Place.xlsx
            git commit -m "chore: add Name_Place.xlsx with hidden location sheet"
            git push
          else
            echo "No changes to commit"
          fi
